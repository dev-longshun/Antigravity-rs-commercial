services:
  antigravity-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: antigravity-manager
    container_name: antigravity-manager
    ports:
      - "${PORT:-8045}:${PORT:-8045}"
    volumes:
      - ~/.antigravity_tools:/root/.antigravity_tools
    environment:
      - LOG_LEVEL=info
      - API_KEY=test  # [重要] 請設置您的安全密鑰，若不設置則在日誌中查看隨機密鑰
      - ABV_BIND_LOCAL_ONLY=false  # 綁定 0.0.0.0，支持容器/雲端部署
    restart: unless-stopped
